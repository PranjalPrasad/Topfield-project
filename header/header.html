<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="header.css">
</head>
<body>
 <!-- header.html -->
<!-- Water Solutions Theme Header - Flowing Design -->

<header class="tf-header">
  <!-- Wave Decoration at Bottom -->
  <div class="tf-wave-decoration">
    <svg class="tf-wave-svg" viewBox="0 0 1440 48" preserveAspectRatio="none">
      <path d="M0,24 C240,48 480,48 720,24 C960,0 1200,0 1440,24 L1440,48 L0,48 Z" fill="rgba(0,150,255,0.15)"/>
      <path d="M0,32 C240,48 480,48 720,32 C960,16 1200,16 1440,32 L1440,48 L0,48 Z" fill="rgba(0,95,140,0.2)"/>
    </svg>
  </div>

  <div class="tf-header-container">
    <div class="tf-logo-wrapper">
      <a href="/" class="tf-logo">
        <!-- Water Drop Icon -->
        <div class="tf-logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M24 4C24 4 12 18 12 28C12 34.6 17.4 40 24 40C30.6 40 36 34.6 36 28C36 18 24 4 24 4Z" fill="#4FC3F7"/>
            <path d="M24 8C24 8 16 18 16 26C16 30.4 19.6 34 24 34C28.4 34 32 30.4 32 26C32 18 24 8 24 8Z" fill="#B3E5FC"/>
            <circle cx="24" cy="28" r="4" fill="#E1F5FE"/>
            <path d="M24 4L26 10L24 12L22 10L24 4Z" fill="#0288D1"/>
          </svg>
        </div>
        <div class="tf-logo-text">
          <!-- INCREASED LOGO SIZE - changed from 40px to 60px -->
          <img src="/images/logo1.png" alt="Topfield Logo" style="height: 60px; width: auto;">
          <!-- <span class="tf-brand-tagline">Total Water Solution & Services</span> -->
        </div>
      </a>
    </div>

    <!-- Navigation with Water-themed hover effects -->
    <nav class="tf-nav">
      <ul class="tf-nav-menu">
        <li class="tf-nav-item">
          <a href="#home" class="tf-nav-link active">
            <span class="nav-text">Home</span>
            <span class="nav-wave"></span>
          </a>
        </li>
        <li class="tf-nav-item tf-dropdown">
          <a href="#services" class="tf-nav-link">
            <span class="nav-text">Services</span>
            <svg class="dropdown-icon" width="14" height="14" viewBox="0 0 14 14">
              <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
            </svg>
            <span class="nav-wave"></span>
          </a>
          <div class="tf-dropdown-menu">
            <!-- Dropdown items with water icons -->
            <a href="#stp">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <circle cx="9" cy="9" r="6" stroke="#005f8c" stroke-width="1.5"/>
                <path d="M9 3V7M9 11V15M3 9H7M11 9H15" stroke="#005f8c" stroke-width="1.5"/>
              </svg>
              STP (Sewage Treatment)
            </a>
            <a href="#wtp">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M3 9H15M9 3V15" stroke="#005f8c" stroke-width="1.5"/>
                <circle cx="9" cy="9" r="6" stroke="#005f8c" stroke-width="1.5"/>
              </svg>
              WTP (Water Softening)
            </a>
            <a href="#ro">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M4 4L14 14M14 4L4 14" stroke="#005f8c" stroke-width="1.5"/>
                <circle cx="9" cy="9" r="5" stroke="#005f8c" stroke-width="1.5"/>
              </svg>
              RO Plants
            </a>
            <div class="dropdown-divider"></div>
            <a href="#chemicals">Chemicals Supply</a>
            <a href="#repair">Repair & Refurbishment</a>
          </div>
        </li>
        <li class="tf-nav-item">
          <a href="#plants" class="tf-nav-link">
            <span class="nav-text">Plants</span>
            <span class="nav-wave"></span>
          </a>
        </li>
        <li class="tf-nav-item">
          <a href="#amc" class="tf-nav-link">
            <span class="nav-text">AMC</span>
            <span class="nav-wave"></span>
          </a>
        </li>
        <li class="tf-nav-item">
          <a href="#projects" class="tf-nav-link">
            <span class="nav-text">Projects</span>
            <span class="nav-wave"></span>
          </a>
        </li>
        <li class="tf-nav-item">
          <a href="#contact" class="tf-nav-link">
            <span class="nav-text">Contact</span>
            <span class="nav-wave"></span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Contact Area with Water Bubbles -->
    <div class="tf-header-actions">
      <!-- Phone with bubble animation -->
      <div class="tf-contact-bubble">
        <div class="tf-bubble-container">
          <div class="bubble bubble-1"></div>
          <div class="bubble bubble-2"></div>
          <div class="bubble bubble-3"></div>
        </div>
        <a href="tel:9673850505" class="tf-phone-link">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3.5 4.5C3.5 3.94772 3.94772 3.5 4.5 3.5H6.5C6.994 3.5 7.417 3.867 7.482 4.357L8.082 8.357C8.141 8.806 7.91 9.241 7.51 9.446L6 10.25C6.83333 12 8.5 13.6667 10.5 14.5L11.304 12.99C11.457 12.69 11.765 12.498 12.106 12.498C12.175 12.498 12.245 12.508 12.313 12.528L16.143 13.928C16.644 14.095 16.976 14.575 16.952 15.096L16.752 17.496C16.724 17.978 16.324 18.351 15.841 18.346C8.98 18.276 3.5 12.637 3.5 5.8V4.5Z" fill="currentColor"/>
          </svg>
          <span class="tf-phone-text">9673850505</span>
        </a>
      </div>

      <!-- Email with ripple effect -->
      <div class="tf-ripple-container">
        <a href="mailto:topfield0505@gmail.com" class="tf-ripple-button">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3.5" y="5" width="13" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 6L10 11L16 6" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="ripple-effect"></span>
        </a>
      </div>

      <!-- Mobile Trigger -->
      <button class="tf-mobile-trigger" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Floating Water Drops (Decorative) -->
  <div class="tf-floating-drops">
    <div class="drop drop-1"></div>
    <div class="drop drop-2"></div>
    <div class="drop drop-3"></div>
  </div>
</header>
<script src="header.js"></script>
</body>
</html>
